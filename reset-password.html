<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="icon" type="image/png" href="assets/icons/logo.png">
  <title>Reset Educator Password | Interactive Literacy Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
  <main class="auth-layout">
    <section class="auth-welcome">
      <a class="brand" href="index.html"><img src="assets/icons/logo.png" alt=""><span class="brand-copy"><strong>Interactive</strong><span>Literacy Hub</span></span></a>
      <span class="eyebrow">Educator account recovery</span>
      <h1>Create a new <span class="accent-green">password</span></h1>
      <p class="lead">Choose a secure password for your educator account.</p>
      <img class="auth-illustration" src="assets/images/teacher-reading.png" alt="An educator reading with learners">
    </section>
    <section class="auth-card" aria-labelledby="resetTitle">
      <a class="back-link" href="login.html">← Back to Sign In</a>
      <h2 id="resetTitle">Reset Password</h2>
      <p id="resetIntro">Checking your secure recovery link…</p>
      <form id="resetPasswordForm" hidden>
        <label for="newPassword">New password</label>
        <input id="newPassword" name="newPassword" type="password" minlength="8" autocomplete="new-password" required>
        <label for="confirmPassword">Confirm new password</label>
        <input id="confirmPassword" name="confirmPassword" type="password" minlength="8" autocomplete="new-password" required>
        <button id="updatePasswordButton" class="btn btn-primary auth-submit" type="submit">Update Password</button>
        <p id="resetStatus" class="auth-message" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.7"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/reset-password.js"></script>
</body>
</html>
